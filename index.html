<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Трекер</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #4a90e2;
            --success: #2ecc71;
            --accent: #e74c3c;
            --archive-btn: #9b59b6;
            --upcoming-btn: #f39c12;
            --text: #f5f6fa;
            --text-secondary: #a0a5b5;
            --border: #2f3640;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--text);
        }

        /* Общая панель */
        .total-card {
            background: linear-gradient(135deg, #2c3a4e, #1e272c);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }
        .total-card h3 { margin: 0; color: var(--text-secondary); font-size: 14px; text-transform: uppercase;}
        .total-card .main-sum { font-size: 32px; font-weight: bold; color: var(--success); margin-top: 5px; }
        
        .total-live-container {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .total-live-container span {
            font-family: monospace;
            font-weight: bold;
            font-size: 15px;
        }
        
        /* Стиль для общего таймера опережения / отставания */
        .global-time-buffer {
            font-size: 13px;
            background: rgba(46, 204, 113, 0.15);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px dashed var(--success);
            color: #fff;
            margin-top: 4px;
        }

        /* Управление отображением */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        /* Список платежей */
        .payment-list { display: flex; flex-direction: column; gap: 15px; }
        
        .payment-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, opacity 0.2s;
            position: relative;
        }
        
        .payment-item.dragging {
            opacity: 0.4;
            border: 2px dashed var(--primary);
            background: #1a1a20;
            transform: scale(0.98);
        }

        /* Специфический стиль для свернутой группы */
        .payment-item.daily-group-card {
            background: linear-gradient(135deg, #23232e, #1a1a24);
            border: 1px solid #4a90e255;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.1);
        }

        .drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #2f3640;
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: grab;
            touch-action: none;
            margin-right: 8px;
            transition: 0.2s;
        }
        .drag-handle:active { cursor: grabbing; background: var(--primary); color: white; }
        .drag-handle:hover { color: #fff; background: #3b4453; }

        /* Галочка включения счета */
        .include-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--success);
            margin-right: 12px;
        }

        .item-header { display: flex; align-items: center; justify-content: space-between; }
        .header-left-side { display: flex; align-items: center; }
        
        .item-title { font-weight: bold; font-size: 18px; color: #fff; }
        .item-dates { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        .item-amounts { text-align: right; }
        .amount-left { font-size: 20px; font-weight: bold; color: var(--text); }
        .amount-total-badge { font-size: 12px; color: var(--text-secondary); }

        /* Живой счетчик */
        .live-counter {
            background: rgba(74, 144, 226, 0.1);
            border: 1px dashed var(--primary);
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-counter span { font-family: monospace; font-weight: bold; color: #54a0ff; font-size: 15px;}

        /* Кнопки действий */
        .item-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; margin-bottom: 5px; justify-content: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 12px;}
        .btn-action {
            padding: 8px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-pay { background: var(--success); color: white; }
        .btn-edit { background: #54a0ff; color: white; }
        .btn-delete { background: var(--accent); color: white; }
        .btn-upcoming { background: var(--upcoming-btn); color: white; }
        .btn-action:hover { opacity: 0.9; }

        /* Детали и история */
        .history-section {
            margin-top: 15px; display: none;
        }
        .history-list { list-style: none; padding: 0; margin: 0; font-size: 13px;}
        .history-item {
            display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #333;
        }
        .history-item:last-child { border-bottom: none; }

        /* Плавающие кнопки */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--primary); border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; font-size: 30px; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4); z-index: 10; transition: 0.2s;
        }
        .fab:hover { transform: scale(1.05); }

        .fab-upcoming {
            position: fixed; bottom: 30px; right: 105px; width: 60px; height: 60px;
            background: var(--upcoming-btn); border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; font-size: 24px; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); z-index: 10; transition: 0.2s;
        }
        .fab-upcoming:hover { transform: scale(1.05); }

        .fab-archive {
            position: fixed; bottom: 30px; right: 180px; width: 60px; height: 60px;
            background: var(--archive-btn); border-radius: 50%; display: flex; justify-content: center;
            align-items: center; color: white; font-size: 24px; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4); z-index: 10; transition: 0.2s;
        }
        .fab-archive:hover { transform: scale(1.05); }

        /* Модальные окна */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 450px;
            border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-content h3 { margin-top: 0; }
        
        /* Формы внутри модалок */
        .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .form-group label { font-size: 13px; color: var(--text-secondary); font-weight: bold; }
        .form-group input, .form-group select {
            padding: 12px; background: #121214; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 15px; outline: none;
        }
        .form-group input:focus { border-color: var(--primary); }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;}
        .btn-cancel { background: #4b5563; color: white; }

        /* Стили для архива */
        .archive-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .archive-item {
            background: #121214; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            font-size: 13px;
        }
        .archive-item-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--success); margin-bottom: 5px;}

        /* Вложенный список ежедневных платежей внутри группы */
        .grouped-daily-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px dashed var(--border);
            padding-top: 12px;
        }
        .grouped-daily-item {
            background: #121214;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💸 Мой Календарь Платежей</h1>

    <div class="total-card">
        <h3>Осталось оплатить по выбранным счетам:</h3>
        <div class="main-sum" id="totalLeft">0.00 ₽</div>
        
        <div class="total-live-container" id="globalLiveCounter">
            Загрузка общего счетчика...
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-action btn-edit" id="toggleCollapseDailyBtn" onclick="toggleDailyCollapse()" style="background: #34495e;">
            📦 Сложить ежедневные
        </button>
    </div>

    <div class="payment-list" id="paymentList"></div>
</div>

<button class="fab-archive" onclick="openArchiveModal()" title="Архив выполненных платежей">📁</button>
<button class="fab-upcoming" onclick="openUpcomingModal()" title="Ближайшие (Отложенные) платежи">📅</button>
<button class="fab" onclick="openAddModal()" title="Новый платёж">+</button>

<div class="modal" id="paymentModal">
    <div class="modal-content">
        <h3 id="modalTitle">Новый платёж</h3>
        <form id="paymentForm">
            <input type="hidden" id="editIndex">
            <input type="hidden" id="creationTimestamp"> 
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="pName" placeholder="Например: Квартплата" required>
            </div>
            <div class="form-group">
                <label>Сумма платежа (₽)</label>
                <input type="number" id="pAmount" min="0" step="any" required>
            </div>
            <div class="form-group">
                <label>Крайний срок (Дата и Время)</label>
                <input type="datetime-local" id="pDate" required>
            </div>
            <div class="form-group">
                <label>Повторение</label>
                <select id="pPeriod">
                    <option value="Разово">Без повторений (Разово)</option>
                    <option value="Каждый день">Раз в день (Ежедневно)</option>
                    <option value="Каждую неделю">Раз в неделю</option>
                    <option value="Каждый месяц">Раз в месяц</option>
                    <option value="Каждый год">Раз в год (Ежегодно)</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-action btn-cancel" onclick="closeModal('paymentModal')">Отмена</button>
                <button type="submit" class="btn-action btn-pay" id="saveBtn">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h3>Внести оплату</h3>
        <form id="payForm">
            <input type="hidden" id="payItemIndex">
            <input type="hidden" id="payHistoryIndex"> 
            <div class="form-group">
                <label>Сумма внесения (₽)</label>
                <input type="number" id="payAmountInput" min="0" step="any" required>
            </div>
            <div class="form-group">
                <label>Дата и время внесения</label>
                <input type="datetime-local" id="payDateInput" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-action btn-cancel" onclick="closeModal('payModal')">Отмена</button>
                <button type="submit" class="btn-action btn-pay" id="paySaveBtn">Подтвердить</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="archiveModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">📁 Архив</h3>
            <button class="btn-action btn-delete" style="padding: 4px 10px;" onclick="clearArchive()">Очистить</button>
        </div>
        <div class="archive-list" id="archiveList"></div>
        <div class="modal-buttons">
            <button type="button" class="btn-action btn-cancel" onclick="closeModal('archiveModal')">Закрыть</button>
        </div>
    </div>
</div>

<div class="modal" id="upcomingModal">
    <div class="modal-content" style="max-width: 650px;">
        <h3 style="margin:0;">📅 Ближайшие платежи</h3>
        <p style="font-size:12px; color:var(--text-secondary); margin-top:5px; margin-bottom:15px;">
            Сюда автоматически попадают платежи, до которых более 30 дней, а также следующие циклы повторяющихся оплат.
        </p>
        <div class="payment-list" id="upcomingList" style="max-height: 55vh; overflow-y:auto; padding-right:5px;"></div>
        <div class="modal-buttons">
            <button type="button" class="btn-action btn-cancel" onclick="closeModal('upcomingModal')">Закрыть</button>
        </div>
    </div>
</div>
<script>
    let payments = JSON.parse(localStorage.getItem('smart_payments_v2')) || [];
    let archive = JSON.parse(localStorage.getItem('smart_archive_v2')) || [];
    
    // Статус группировки ежедневных платежей (сохраняется в локальную память)
    let isDailyCollapsed = JSON.parse(localStorage.getItem('daily_collapsed_v2')) || false;

    let isDraggingNow = false;
    let touchTimeout = null;

    function makeId() { return Math.random().toString(36).substr(2, 9); }

    // Переключатель сворачивания/разворачивания ежедневных платежей
    function toggleDailyCollapse() {
        isDailyCollapsed = !isDailyCollapsed;
        localStorage.setItem('daily_collapsed_v2', JSON.stringify(isDailyCollapsed));
        const btn = document.getElementById('toggleCollapseDailyBtn');
        if(btn) {
            btn.textContent = isDailyCollapsed ? '📖 Разложить ежедневные' : '📦 Сложить ежедневные';
        }
        renderList();
    }

    function openAddModal() {
        document.getElementById('paymentForm').reset();
        document.getElementById('editIndex').value = '';
        document.getElementById('creationTimestamp').value = new Date().toISOString(); 
        document.getElementById('modalTitle').textContent = 'Новый платёж';
        
        let d = new Date();
        d.setDate(d.getDate() + 4);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById('pDate').value = d.toISOString().slice(0,16);

        document.getElementById('paymentModal').style.display = 'flex';
    }

    function openUpcomingModal() {
        document.getElementById('upcomingModal').style.display = 'flex';
    }

    function openArchiveModal() {
        const listEl = document.getElementById('archiveList');
        listEl.innerHTML = '';
        
        if(archive.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; color:var(--text-secondary); margin-top:20px;">Архив пуст</div>';
        } else {
            [...archive].reverse().forEach((item, revIdx) => {
                const realIdx = archive.length - 1 - revIdx;
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <div class="archive-item-header">
                        <span>${item.name}</span>
                        <span>${item.totalAmount.toLocaleString()} ₽</span>
                    </div>
                    <div style="color:var(--text-secondary); font-size:11px; margin-bottom: 8px;">
                        Срок был: ${fmtDate(item.deadline)} | Тип: ${item.period}<br>
                        Закрыт: ${fmtDate(item.archivedAt)}
                    </div>
                    <div style="text-align:right;">
                        <button class="btn-action btn-edit" style="padding: 4px 10px;" onclick="restoreFromArchive(${realIdx}, event)">♻️ Восстановить</button>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }
        document.getElementById('archiveModal').style.display = 'flex';
    }

    function clearArchive() {
        if(confirm('Вы уверены, что хотите полностью очистить историю архива?')) {
            archive = [];
            localStorage.setItem('smart_archive_v2', JSON.stringify(archive));
            openArchiveModal();
        }
    }

    function restoreFromArchive(idx, e) {
        e.stopPropagation();
        if(confirm('Вернуть этот платёж на главный экран?\nОчередь автоматически перестроится.')) {
            let item = archive.splice(idx, 1)[0];
            delete item.archivedAt; 
            item.status = 'active'; 
            
            if (item.period !== 'Разово' && item.chainId) {
                let chainPayments = payments.filter(p => p.chainId === item.chainId);
                if (chainPayments.length > 0) {
                    chainPayments.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
                    let latestFuture = chainPayments[chainPayments.length - 1];
                    let removeIdx = payments.indexOf(latestFuture);
                    if (removeIdx !== -1) {
                        payments.splice(removeIdx, 1); 
                    }
                }
            }

            payments.push(item);
            
            localStorage.setItem('smart_archive_v2', JSON.stringify(archive));
            saveAndRefresh();
            openArchiveModal(); 
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const index = document.getElementById('editIndex').value;
        const targetDate = document.getElementById('pDate').value;
        
        if(index === '') {
            let chainId = makeId(); 
            let d = new Date(targetDate);
            let n = new Date();
            let diffDays = (d - n) / (1000 * 3600 * 24);

            const paymentData = {
                chainId: chainId,
                name: document.getElementById('pName').value,
                totalAmount: parseFloat(document.getElementById('pAmount').value),
                deadline: targetDate,
                period: document.getElementById('pPeriod').value,
                created: document.getElementById('creationTimestamp').value || new Date().toISOString(),
                included: true, 
                isManuallySet: false,
                history: [] 
            };
            
            paymentData.status = (diffDays > 31) ? 'upcoming' : 'active';
            payments.push(paymentData);

            if (paymentData.period !== 'Разово') {
                let nextData = JSON.parse(JSON.stringify(paymentData));
                nextData.deadline = getNextDeadline(paymentData.deadline, paymentData.period);
                nextData.status = 'upcoming'; 
                nextData.history = [];
                nextData.created = new Date().toISOString();
                payments.push(nextData);
            }

        } else {
            const currentIdx = parseInt(index);
            let currentItem = payments[currentIdx];
            let oldChainId = currentItem.chainId;

            currentItem.name = document.getElementById('pName').value;
            currentItem.totalAmount = parseFloat(document.getElementById('pAmount').value);
            currentItem.deadline = targetDate;
            currentItem.period = document.getElementById('pPeriod').value;

            if (currentItem.period !== 'Разово' && oldChainId) {
                payments.forEach((item, i) => {
                    if (i !== currentIdx && item.chainId === oldChainId) {
                        item.name = currentItem.name;
                        item.totalAmount = currentItem.totalAmount;
                        item.period = currentItem.period;
                        item.deadline = getNextDeadline(currentItem.deadline, currentItem.period);
                    }
                });
            }
        }

        saveAndRefresh();
        closeModal('paymentModal');
    });

    function openPayModal(index, e, historyIndex = -1) {
        e.stopPropagation();
        document.getElementById('payItemIndex').value = index;
        document.getElementById('payHistoryIndex').value = historyIndex;
        
        let now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        
        if(historyIndex === -1) {
            let p = payments[index];
            let totalPaid = p.history.reduce((sum, item) => sum + item.amount, 0);
            let realLeft = p.totalAmount - totalPaid;
            if(realLeft < 0) realLeft = 0;

            document.getElementById('payAmountInput').value = realLeft > 0 ? realLeft.toFixed(2) : '';
            document.getElementById('payDateInput').value = now.toISOString().slice(0,16);
            document.getElementById('paySaveBtn').textContent = 'Внести';
        } else {
            let record = payments[index].history[historyIndex];
            document.getElementById('payAmountInput').value = record.amount;
            document.getElementById('payDateInput').value = record.date;
            document.getElementById('paySaveBtn').textContent = 'Исправить';
        }
        document.getElementById('payModal').style.display = 'flex';
    }

    document.getElementById('payForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const itemIdx = document.getElementById('payItemIndex').value;
        const histIdx = document.getElementById('payHistoryIndex').value;
        const amount = parseFloat(document.getElementById('payAmountInput').value);
        const date = document.getElementById('payDateInput').value;

        if (histIdx === '-1') {
            payments[itemIdx].history.push({ amount, date });
        } else {
            payments[itemIdx].history[histIdx] = { amount, date };
        }

        checkAndHandleRepetition(itemIdx);
        closeModal('payModal');
    });

    function getNextDeadline(currentDeadlineStr, period) {
        let currentDeadline = new Date(currentDeadlineStr);
        switch(period) {
            case 'Каждый день': currentDeadline.setDate(currentDeadline.getDate() + 1); break;
            case 'Каждую неделю': currentDeadline.setDate(currentDeadline.getDate() + 7); break;
            case 'Каждый месяц': currentDeadline.setMonth(currentDeadline.getMonth() + 1); break;
            case 'Каждый год': currentDeadline.setFullYear(currentDeadline.getFullYear() + 1); break;
        }
        return currentDeadline.toISOString().slice(0,16);
    }

    function checkAndHandleRepetition(idx) {
        let p = payments[idx];
        let totalPaid = p.history.reduce((sum, item) => sum + item.amount, 0);
        
        if (totalPaid >= p.totalAmount) {
            let archiveItem = JSON.parse(JSON.stringify(p)); 
            archiveItem.archivedAt = new Date().toISOString();
            archive.push(archiveItem);
            localStorage.setItem('smart_archive_v2', JSON.stringify(archive));

            let isRecurring = p.period !== 'Разово';
            let currentChainId = p.chainId;

            payments.splice(idx, 1);

            if (isRecurring) {
                let nextPayment = payments.find(item => item.chainId === currentChainId);
                
                if (nextPayment) {
                    let futureData = JSON.parse(JSON.stringify(nextPayment));
                    futureData.deadline = getNextDeadline(nextPayment.deadline, nextPayment.period);
                    futureData.status = 'upcoming'; 
                    futureData.history = [];
                    futureData.created = new Date().toISOString();
                    payments.push(futureData);
                } else {
                    let futureData = JSON.parse(JSON.stringify(archiveItem));
                    delete futureData.archivedAt;
                    futureData.deadline = getNextDeadline(archiveItem.deadline, archiveItem.period);
                    futureData.status = 'upcoming';
                    futureData.history = [];
                    futureData.created = new Date().toISOString();
                    payments.push(futureData);
                }
                alert(`🔄 Платёж закрыт! Очередь сдвигается.`);
            } else {
                alert(`🎉 Платёж полностью выполнен и перенесён в архив!`);
            }
        }
        saveAndRefresh();
    }

    function deletePayment(index, e) {
        e.stopPropagation();
        if(confirm('Удалить этот платёж и всю его историю? (Если это цепочка, следующие платежи в Ближайших тоже удалятся)')) {
            let targetChainId = payments[index].chainId;
            payments = payments.filter((p, i) => i !== index && p.chainId !== targetChainId);
            saveAndRefresh();
        }
    }

    function deleteHistoryItem(itemIdx, histIdx, e) {
        e.stopPropagation();
        if(confirm('Удалить эту запись об оплате? Сумма долга пересчитается.')) {
            payments[itemIdx].history.splice(histIdx, 1);
            saveAndRefresh();
        }
    }

    function editPayment(index, e) {
        e.stopPropagation();
        let p = payments[index];
        document.getElementById('editIndex').value = index;
        document.getElementById('creationTimestamp').value = p.created || new Date().toISOString();
        document.getElementById('pName').value = p.name;
        document.getElementById('pAmount').value = p.totalAmount;
        document.getElementById('pDate').value = p.deadline;
        document.getElementById('pPeriod').value = p.period;
        
        document.getElementById('modalTitle').textContent = 'Редактировать платёж';
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function toggleHistory(index) {
        if(isDraggingNow) return; 
        let el = document.getElementById(`history-${index}`);
        if(el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function toggleInclude(index, e) {
        e.stopPropagation();
        payments[index].isManuallySet = true;
        if(payments[index].included === undefined) payments[index].included = true;
        payments[index].included = !payments[index].included;
        saveAndRefresh(); 
    }

    function moveToMain(index, e) {
        e.stopPropagation();
        payments[index].status = 'active';
        saveAndRefresh();
    }

    function moveToUpcoming(index, e) {
        e.stopPropagation();
        payments[index].status = 'upcoming';
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('smart_payments_v2', JSON.stringify(payments));
        renderList();
    }

    function fmtDate(str) {
        return new Date(str).toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    }

    function renderList() {
        const listEl = document.getElementById('paymentList');
        const upcomingListEl = document.getElementById('upcomingList');
        const toggleBtn = document.getElementById('toggleCollapseDailyBtn');
        
        if(toggleBtn) {
            toggleBtn.textContent = isDailyCollapsed ? '📖 Разложить ежедневные' : '📦 Сложить ежедневные';
        }
        
        listEl.innerHTML = '';
        if(upcomingListEl) upcomingListEl.innerHTML = '';

        let nowForCheck = new Date();
        payments.forEach(p => {
            if (!p.chainId) p.chainId = makeId(); 
            
            let d = new Date(p.deadline);
            let diffDays = (d - nowForCheck) / (1000 * 3600 * 24);
            
            if (diffDays > 31) {
                p.status = 'upcoming'; 
            } else {
                let hasOlder = payments.some(other => 
                    other.chainId === p.chainId && 
                    new Date(other.deadline) < new Date(p.deadline)
                );
                
                if (!hasOlder) {
                    p.status = 'active'; 
                } else {
                    p.status = 'upcoming'; 
                }
            }
        });

        payments.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
        localStorage.setItem('smart_payments_v2', JSON.stringify(payments));

        // Временные переменные для создания сложенной группы
        let dailyGroupAmountLeft = 0;
        let dailyGroupTotalAmount = 0;
        let dailyItemsHTML = '';
        let hasActiveDaily = false;

        payments.forEach((p, idx) => {
            const now = new Date();
            const deadline = new Date(p.deadline);
            const timeDiff = deadline - now;
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
            const isWithin3Days = timeDiff > 0 && timeDiff <= threeDaysMs;

            if (p.isManuallySet !== true) {
                p.included = isWithin3Days;
            }

            let totalPaid = p.history.reduce((sum, item) => sum + item.amount, 0);
            let realLeft = p.totalAmount - totalPaid;
            if(realLeft < 0) realLeft = 0;

            const isIncluded = p.included !== false;
            const isUpcomingMode = p.status === 'upcoming';

            // Если включен режим группировки, элемент активный и это ежедневный повтор
            if (isDailyCollapsed && !isUpcomingMode && p.period === 'Каждый день') {
                hasActiveDaily = true;
                dailyGroupAmountLeft += realLeft;
                dailyGroupTotalAmount += p.totalAmount;

                // Собираем мини-карточки для отображения внутри раскрывающейся папки
                dailyItemsHTML += `
                    <div class="grouped-daily-item" onclick="event.stopPropagation(); toggleHistory(${idx})">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="font-size:15px; color:#fff;">${p.name}</b>
                                <div style="font-size:11px; color:var(--text-secondary);">Срок: ${fmtDate(p.deadline)}</div>
                            </div>
                            <div style="text-align:right;">
                                <span style="font-size:16px; font-weight:bold; color:var(--text);">${realLeft.toLocaleString()} ₽</span>
                                <div style="font-size:10px; color:var(--text-secondary);">из ${p.totalAmount.toLocaleString()} ₽</div>
                            </div>
                        </div>
                        <div class="history-section" id="history-${idx}" onclick="event.stopPropagation()">
                            <div class="item-actions">
                                <button class="btn-action btn-pay" onclick="openPayModal(${idx}, event)">Внести ₽</button>
                                <button class="btn-action btn-upcoming" onclick="moveToUpcoming(${idx}, event)">В "Ближайшие"</button>
                                <button class="btn-action btn-edit" onclick="editPayment(${idx}, event)">Редактировать</button>
                                <button class="btn-action btn-delete" onclick="deletePayment(${idx}, event)">Удалить</button>
                            </div>
                        </div>
                    </div>
                `;
                return; // Пропускаем обычный рендер этой карточки на главный экран
            }

            // Обычный рендер для остальных или если группировка выключена
            const card = document.createElement('div');
            card.className = 'payment-item';
            card.setAttribute('id', `card-item-${idx}`);
            card.setAttribute('data-index', idx);
            card.setAttribute('onclick', `toggleHistory(${idx})`);
            
            let historyHTML = '';
            if(p.history && p.history.length > 0) {
                p.history.forEach((h, hIdx) => {
                    historyHTML += `
                        <li class="history-item">
                            <span>✅ ${fmtDate(h.date)} — <b>${h.amount.toLocaleString()} ₽</b></span>
                            <div>
                                <button class="btn-action btn-edit" style="padding:3px 8px;" onclick="openPayModal(${idx}, event, ${hIdx})">✏️</button>
                                <button class="btn-action btn-delete" style="padding:3px 8px;" onclick="deleteHistoryItem(${idx}, ${hIdx}, event)">❌</button>
                            </div>
                        </li>`;
                });
            } else {
                historyHTML = '<li style="color:var(--text-secondary); text-align:center;">Истории частичных оплат пока нет</li>';
            }

            card.innerHTML = `
                <div class="item-header">
                    <div class="header-left-side">
                        ${!isUpcomingMode ? `<div class="drag-handle" id="handle-${idx}">☰</div>` : `<div style="width:10px;"></div>`}
                        <input type="checkbox" class="include-checkbox" ${isIncluded ? 'checked' : ''} onclick="toggleInclude(${idx}, event)">
                        <div>
                            <div class="item-title" style="${isIncluded ? '' : 'color: var(--text-secondary); text-decoration: line-through;'}">${p.name}</div>
                            <div class="item-dates">Срок: <b>${fmtDate(p.deadline)}</b> | Повтор: ${p.period}</div>
                        </div>
                    </div>
                    <div class="item-amounts">
                        <div class="amount-left">${realLeft.toLocaleString()} ₽</div>
                        <div class="amount-total-badge">из ${p.totalAmount.toLocaleString()} ₽</div>
                    </div>
                </div>

                <div class="live-counter" id="live-${idx}">
                    <span>Загрузка счетчика...</span>
                </div>

                <div class="history-section" id="history-${idx}" onclick="event.stopPropagation()">
                    <div class="item-actions">
                        <button class="btn-action btn-pay" onclick="openPayModal(${idx}, event)">Внести ₽</button>
                        ${isUpcomingMode 
                            ? `<button class="btn-action btn-upcoming" onclick="moveToMain(${idx}, event)">На главный экран</button>`
                            : `<button class="btn-action btn-upcoming" onclick="moveToUpcoming(${idx}, event)">В "Ближайшие"</button>`
                        }
                        <button class="btn-action btn-edit" onclick="editPayment(${idx}, event)">Редактировать</button>
                        <button class="btn-action btn-delete" onclick="deletePayment(${idx}, event)">Удалить</button>
                    </div>
                    <h4 style="margin: 10px 0 10px 0; font-size:14px; color:var(--primary)">📜 История взносов:</h4>
                    <ul class="history-list">${historyHTML}</ul>
                </div>
            `;
            
            if (!isUpcomingMode) {
                setupDragEvents(card, idx, listEl);
                listEl.appendChild(card);
            } else {
                if(upcomingListEl) upcomingListEl.appendChild(card);
            }
            card.setAttribute('draggable', 'false'); 
        });

        // Создаем и выводим сложенную плитку для ежедневных оплат на главный экран
        if (isDailyCollapsed && hasActiveDaily) {
            const groupCard = document.createElement('div');
            groupCard.className = 'payment-item daily-group-card';
            groupCard.setAttribute('onclick', 'let s = document.getElementById("dailyGroupSection").style; s.display = s.display === "block" ? "none" : "block";');
            
            groupCard.innerHTML = `
                <div class="item-header">
                    <div class="header-left-side">
                        <div style="font-size: 24px; margin-right: 12px;">📦</div>
                        <div>
                            <div class="item-title" style="color: #4a90e2;">Ежедневные расходы (Сборная группа)</div>
                            <div class="item-dates" style="color: var(--text-secondary)">Нажми, чтобы раскрыть список внутри</div>
                        </div>
                    </div>
                    <div class="item-amounts">
                        <div class="amount-left" style="color: var(--upcoming-btn);">${dailyGroupAmountLeft.toLocaleString()} ₽</div>
                        <div class="amount-total-badge">всего: ${dailyGroupTotalAmount.toLocaleString()} ₽</div>
                    </div>
                </div>
                <div id="dailyGroupSection" style="display:none;" onclick="event.stopPropagation()">
                    <div class="grouped-daily-list">
                        ${dailyItemsHTML}
                    </div>
                </div>
            `;
            // Вставляем группу в самое начало главного списка
            listEl.insertBefore(groupCard, listEl.firstChild);
        }

        calculateGlobalStatsOnly();
    }

    function setupDragEvents(card, idx, listEl) {
        const handle = card.querySelector('.drag-handle');
        if (!handle) return;

        handle.addEventListener('mouseenter', () => card.setAttribute('draggable', 'true'));
        handle.addEventListener('mouseleave', () => {
            if(!isDraggingNow) card.setAttribute('draggable', 'false');
        });

        card.addEventListener('dragstart', (e) => {
            isDraggingNow = true;
            card.classList.add('dragging');
        });

        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            card.setAttribute('draggable', 'false');
            reorderDataStructure(); 
            setTimeout(() => { isDraggingNow = false; }, 100); 
        });

        handle.addEventListener('touchstart', (e) => {
            touchTimeout = setTimeout(() => {
                isDraggingNow = true;
                card.classList.add('dragging');
            }, 150); 
        }, { passive: true });

        handle.addEventListener('touchmove', (e) => {
            if (!isDraggingNow) {
                clearTimeout(touchTimeout);
                return;
            }
            const touch = e.touches[0];
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            const nextCard = targetEl ? targetEl.closest('#paymentList .payment-item') : null;
            
            if (nextCard && nextCard !== card) {
                const box = nextCard.getBoundingClientRect();
                const nextCardCenterY = box.top + box.height / 2;
                if (touch.clientY < nextCardCenterY) {
                    listEl.insertBefore(card, nextCard);
                } else {
                    listEl.insertBefore(card, nextCard.nextSibling);
                }
            }
        }, { passive: false });

        handle.addEventListener('touchend', () => {
            clearTimeout(touchTimeout);
            if (isDraggingNow) {
                card.classList.remove('dragging');
                reorderDataStructure();
                setTimeout(() => { isDraggingNow = false; }, 100);
            }
        });
    }

    const listContainer = document.getElementById('paymentList');
    if(listContainer) {
        listContainer.addEventListener('dragover', (e) => {
            e.preventDefault(); 
            const draggingCard = document.querySelector('.dragging');
            if(!draggingCard) return;

            const siblings = [...listContainer.querySelectorAll('.payment-item:not(.dragging)')];
            let nextSibling = siblings.find(sibling => {
                const box = sibling.getBoundingClientRect();
                return e.clientY <= box.top + box.height / 2;
            });

            listContainer.insertBefore(draggingCard, nextSibling);
        });
    }

    function reorderDataStructure() {
        const currentCards = [...document.querySelectorAll('.payment-item:not(.daily-group-card)')];
        let newPaymentsArray = [];
        
        currentCards.forEach(card => {
            let originalIndex = parseInt(card.getAttribute('data-index'));
            if(!isNaN(originalIndex)) {
                newPaymentsArray.push(payments[originalIndex]);
            }
        });
        
        // Дозаписываем те элементы, которые сейчас скрыты из-за группировки daily
        payments.forEach(p => {
            if(!newPaymentsArray.includes(p)) {
                newPaymentsArray.push(p);
            }
        });

        payments = newPaymentsArray;
        localStorage.setItem('smart_payments_v2', JSON.stringify(payments));
        renderList();
    }

    function calculateGlobalStatsOnly() {
        let totalLeftGlobal = 0;
        let globalNeedToStore = 0; 
        let globalAheadAmount = 0;  
        let activeTracksCount = 0;  
        
        let totalPositiveBufferSec = 0; 
        let totalNegativeSpeed = 0;     
        let totalPositiveSpeed = 0;     

        payments.forEach((p, idx) => {
            const counterEl = document.getElementById(`live-${idx}`);
            
            const now = new Date();
            const deadline = new Date(p.deadline);
            const created = new Date(p.created || now);

            const timeDiff = deadline - now;
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
            const isWithin3Days = timeDiff > 0 && timeDiff <= threeDaysMs;

            if (p.isManuallySet !== true) {
                const oldIncluded = p.included;
                p.included = isWithin3Days;
                
                if (oldIncluded !== p.included) {
                    const chk = document.querySelector(`#card-item-${idx} .include-checkbox`);
                    if (chk) chk.checked = p.included;
                    const titleEl = document.querySelector(`#card-item-${idx} .item-title`);
                    if (titleEl) {
                        titleEl.style.color = p.included ? '' : 'var(--text-secondary)';
                        titleEl.style.textDecoration = p.included ? '' : 'line-through';
                    }
                }
            }

            let totalPaid = p.history.reduce((sum, item) => sum + item.amount, 0);
            let realLeft = p.totalAmount - totalPaid;
            if(realLeft < 0) realLeft = 0;

            const isIncluded = p.included !== false;
            const effectivelyIncluded = isIncluded && p.status !== 'upcoming';

            if (effectivelyIncluded) {
                totalLeftGlobal += realLeft;
            }

            if (counterEl) {
                if (now >= deadline) {
                    counterEl.innerHTML = `<span style="color:var(--accent)">⏳ Срок оплаты наступил! Остаток: ${realLeft.toFixed(2)} ₽</span>`;
                    return;
                }

                if (realLeft <= 0) {
                    counterEl.innerHTML = `<span style="color:var(--success)">🎉 Платёж полностью закрыт!</span>`;
                    const restSec = (deadline - now) / 1000;
                    if(restSec > 0 && effectivelyIncluded) totalPositiveBufferSec += restSec; 
                    return;
                }

                const secondsLeft = Math.floor((deadline - now) / 1000);
                if (secondsLeft <= 0) return;

                const totalDurationSec = (deadline - created) / 1000;
                const passedSec = (now - created) / 1000;

                if (totalDurationSec <= 0 || passedSec < 0) {
                    counterEl.innerHTML = `<span>⏳ Расчет начнется в назначенное время</span>`;
                    return;
                }

                let rawShouldHave = (p.totalAmount / totalDurationSec) * passedSec;
                let costPerSecond = p.totalAmount / totalDurationSec; 
                let statusHTML = '';

                if (totalPaid >= rawShouldHave) {
                    let aheadAmount = totalPaid - rawShouldHave;
                    statusHTML = `<span style="color:var(--success)">🚀 Опережение: +${aheadAmount.toFixed(4)} ₽</span>`;
                    
                    if(effectivelyIncluded) {
                        globalAheadAmount += aheadAmount; 
                        activeTracksCount++;
                        if(costPerSecond > 0) {
                            totalPositiveBufferSec += (aheadAmount / costPerSecond);
                            totalPositiveSpeed += costPerSecond;
                        }
                    }
                } else {
                    let cleanNeedToStoreRightNow = rawShouldHave - totalPaid;
                    statusHTML = `Надо отложить: <span id="sum-ticker-${idx}" style="color:#54a0ff; font-family:monospace; font-weight:bold;">${cleanNeedToStoreRightNow.toFixed(4)} ₽</span>`;
                    
                    if(effectivelyIncluded) {
                        globalNeedToStore += cleanNeedToStoreRightNow; 
                        activeTracksCount++;
                        if(costPerSecond > 0) {
                            totalNegativeSpeed += costPerSecond;
                        }
                    }
                }

                const days = Math.floor(secondsLeft / 86400);
                const hours = Math.floor((secondsLeft % 86400) / 3600);
                const minutes = Math.floor((secondsLeft % 3600) / 60);
                const seconds = secondsLeft % 60;

                counterEl.innerHTML = `
                    <div>⏱ Ост. <b>${days}д ${hours}ч ${minutes}м ${seconds}с</b></div>
                    <div style="text-align: right; font-size: 13px;">${statusHTML}</div>
                `;
            }
        });

        document.getElementById('totalLeft').textContent = `${totalLeftGlobal.toLocaleString()} ₽`;

        const globalCounterEl = document.getElementById('globalLiveCounter');
        if (globalCounterEl) {
            if (payments.length === 0 || activeTracksCount === 0) {
                globalCounterEl.innerHTML = '<div>Нет активных выбранных платежей для расчета общего пульта</div>';
            } else {
                let combinedHTML = '<div>';
                
                if (globalNeedToStore > 0) {
                    combinedHTML += `Общая потребность: <span style="color:#54a0ff;">${globalNeedToStore.toFixed(4)} ₽</span>`;
                }
                if (globalAheadAmount > 0) {
                    if (globalNeedToStore > 0) combinedHTML += ' | ';
                    combinedHTML += `Общее опережение: <span style="color:var(--success)">+${globalAheadAmount.toFixed(4)} ₽</span>`;
                }
                combinedHTML += '</div>';

                let speedPerHour = 0;
                let speedPerDay = 0;
                let currentSpeedLabel = "";

                if (globalAheadAmount >= globalNeedToStore) {
                    speedPerHour = totalPositiveSpeed * 3600;
                    speedPerDay = totalPositiveSpeed * 86400;
                    currentSpeedLabel = `<span style="color:var(--success)">Скорость опережения: +${speedPerHour.toFixed(2)} ₽/час | +${speedPerDay.toFixed(2)} ₽/день</span>`;
                } else {
                    speedPerHour = totalNegativeSpeed * 3600;
                    speedPerDay = totalNegativeSpeed * 86400;
                    currentSpeedLabel = `<span style="color:#54a0ff;">Скорость потребности: ${speedPerHour.toFixed(2)} ₽/час | ${speedPerDay.toFixed(2)} ₽/день</span>`;
                }

                combinedHTML += `<div style="font-size: 13px; margin-top: 2px;">📊 ${currentSpeedLabel}</div>`;

                if (globalAheadAmount >= globalNeedToStore && totalPositiveBufferSec > 0) {
                    let totalSec = Math.floor(totalPositiveBufferSec);
                    const bDays = Math.floor(totalSec / 86400);
                    const bHours = Math.floor((totalSec % 86400) / 3600);
                    const bMinutes = Math.floor((totalSec % 3600) / 60);
                    const bSeconds = totalSec % 60;
                    
                    combinedHTML += `
                        <div class="global-time-buffer">
                            🛡️ Вы опережаете график времени на: 
                            <span>${bDays}д ${bHours}ч ${bMinutes}м ${bSeconds}с</span>
                        </div>`;
                } else if (globalNeedToStore > 0 && totalNegativeSpeed > 0) {
                    let netDebt = globalNeedToStore - globalAheadAmount;
                    if (netDebt < 0) netDebt = globalNeedToStore; 
                    
                    let totalNegativeSec = Math.floor(netDebt / totalNegativeSpeed);
                    const nDays = Math.floor(totalNegativeSec / 86400);
                    const nHours = Math.floor((totalNegativeSec % 86400) / 3600);
                    const nMinutes = Math.floor((totalNegativeSec % 3600) / 60);
                    const nSeconds = totalNegativeSec % 60;
                    
                    combinedHTML += `
                        <div class="global-time-buffer" style="background:rgba(231, 76, 60, 0.15); border-color:var(--accent);">
                            ⚠️ Вы отстаете от графика времени на: 
                            <span style="color:var(--accent); font-family:monospace;">${nDays}д ${nHours}ч ${nMinutes}м ${nSeconds}с</span>
                        </div>`;
                } else {
                    combinedHTML += `
                        <div class="global-time-buffer" style="background:rgba(241, 196, 15, 0.1); border-color:#f1c40f;">
                            ⚖️ Вы идете идеально ровно по графику секунда в секунду!
                        </div>`;
                }
                globalCounterEl.innerHTML = combinedHTML;
            }
        }
    }

    renderList();
    setInterval(calculateGlobalStatsOnly, 1000);
</script>
</body>
</html>
